<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floralife</title>
    <link  rel="Stylesheet"  href="style.css">
</head>
<body>
    <!--Navigation bar-->
    <header>
        <nav>
        <img src="Floralife3.png" alt="logo">
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="about_us.html">About Us</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="shop.html">Shop</a></li>
        </ul>
        <div class="menu">
            <img  src="menubar.png" alt="menu">
        </div>
        </nav>
    </header>

    <main>

        <!--main content-->
        <section class="main">
            <img class="main-img" src="floralife3.png" alt="logo">
            <div class="search-bar">
                <button class="search" ><img src="search.png"  alt="search" width="10px" ></button>
                <input class="search-button" type="text" placeholder="Search">
                <button class="Filter">Filter</button>
            </div>
            <div>
                <h1 class="first-text">Welcome to the World of Plants!</h1>
                <p class="second-text">Discover the most beautiful plants for your home and office.</p>
            </div>
        </section>
    
        <!--products-->
        <section class="products">
            <div class="products-1">
                <img class="products-img" src="African Violet flower.jpg" alt="African Violet Flower">
                <div class="information">
                    <button class="name">African Violet</button>
                    <button class="price">5$</button>
                    <button class="bye">Bye Now</button>
                </div>
                
            </div>
            <div class="products-1">
                <img class="products-img" src="ornage Dawodi-Flower.jpg" alt="Ornage Dawodi Flower"> 
                <div class="information">
                    <button class="name">Ornage Dawodi</button>
                    <button class="price">6$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>
               
            <div class="products-1">
                <img class="products-img" src="yellow dawodi flower.jpg" alt="Yellow Dawodi Flower">
                <div class="information">
                    <button class="name">Yellow Dawodi</button>
                    <button class="price">6$</button>
                    <button class="bye">Bye Now</button>
                </div>  
            </div>   

            <div class="products-1">
                <img class="products-img" src="Aloe flower.jpg" alt="Aloe flower">
                <div class="information">
                    <button class="name">Aloe</button>
                    <button class="price">4$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>
                     
            <div class="products-1">
                <img class="products-img" src="olive shrub.jpg" alt="Olive Shrub">
                <div class="information">
                    <button class="name">Olive</button>
                    <button class="price">10$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>

            <div class="products-1">
                <img class="products-img" src="ficus retusa-shrub .jpg" alt="Ficus Retusa Shrub">
                <div class="information">
                    <button class="name">Ficus Retusa</button>
                    <button class="price">12$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>

            <div class="products-1">
                <img class="products-img" src="Amestel king shrub.jpg" alt="Amestel King Shrub">
                <div class="information">
                    <button class="name">Amestel King</button>
                    <button class="price">15$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>

            <div class="products-1">
                <img class="products-img" src="benjamina shrub.jpg" alt="Benjamina Shrub">
                <div class="information">
                    <button class="name">Benjamina</button>
                    <button class="price">20$</button>
                    <button class="bye">Bye Now</button>
                </div>
            </div>

        </section>

    </main>


    <footer>
        <!--shop name and year-->
        <h2>Floralife - 2026</h2> 
    </footer>
